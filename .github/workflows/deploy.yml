# Example deploy workflow: build → deploy → cache purge → smoke test
#
# Customize for your stack. This example assumes:
# - SSH-based deployment via rsync
# - A CDN cache that needs purging after deploy
# - Playwright smoke tests to verify the deploy worked
#
# Required GitHub Secrets:
#   SSH_PRIVATE_KEY  — deploy key for your server
#   SERVER_HOST      — hostname or IP
#   SERVER_USER      — SSH username
#   SERVER_PORT      — SSH port (default 22)
#   STAGING_URL      — full URL of staging site for smoke tests
#   CDN_ZONE_ID      — CDN zone identifier (if using Cloudflare or similar)
#   CDN_API_EMAIL    — CDN API email
#   CDN_API_KEY      — CDN API key

name: Deploy to Staging

on:
  push:
    branches: [main]
    paths-ignore:
      - '*.md'
      - '.env.example'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      # Add build steps here (e.g., npm install, compile CSS, bundle JS)
      # - uses: actions/setup-node@v4
      #   with:
      #     node-version: '20'
      # - run: npm ci && npm run build

      - name: Deploy via rsync
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${SERVER_PORT:-22} $SERVER_HOST >> ~/.ssh/known_hosts 2>/dev/null

          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -p ${SERVER_PORT:-22}" \
            --exclude '.git' \
            --exclude '.gitignore' \
            --exclude '.env' \
            --exclude '.github' \
            --exclude 'tests' \
            --exclude 'CLAUDE.md' \
            --exclude 'TODOS.md' \
            --exclude '*-AGENT.md' \
            --exclude 'specs' \
            ./ ${SERVER_USER}@${SERVER_HOST}:/path/to/your/app/

  cache-purge:
    needs: deploy
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      # Purge application cache (customize for your stack)
      - name: Purge application cache
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${SERVER_PORT:-22} $SERVER_HOST >> ~/.ssh/known_hosts 2>/dev/null

          # Example: flush Redis cache
          # ssh -i ~/.ssh/deploy_key -p ${SERVER_PORT:-22} ${SERVER_USER}@${SERVER_HOST} "redis-cli FLUSHDB"

          # Example: flush WordPress cache
          # ssh -i ~/.ssh/deploy_key -p ${SERVER_PORT:-22} ${SERVER_USER}@${SERVER_HOST} "wp cache flush"

          echo "Application cache purged"

      # Purge CDN edge cache (Cloudflare example)
      # - name: Purge CDN cache
      #   env:
      #     CDN_ZONE_ID: ${{ secrets.CDN_ZONE_ID }}
      #     CDN_API_EMAIL: ${{ secrets.CDN_API_EMAIL }}
      #     CDN_API_KEY: ${{ secrets.CDN_API_KEY }}
      #   run: |
      #     curl -s -X POST "https://api.cloudflare.com/client/v4/zones/${CDN_ZONE_ID}/purge_cache" \
      #       -H "X-Auth-Email: ${CDN_API_EMAIL}" \
      #       -H "X-Auth-Key: ${CDN_API_KEY}" \
      #       -H "Content-Type: application/json" \
      #       --data '{"purge_everything":true}'

  smoke-test:
    needs: cache-purge
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright
        run: |
          npm install @playwright/test
          npx playwright install --with-deps chromium

      - name: Run smoke tests
        env:
          SITE_URL: ${{ secrets.STAGING_URL }}
        run: npx playwright test tests/smoke.spec.js --reporter=list
